<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis - AI Assistant</title>
  <meta http-equiv="Content-Language" content="en">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 900px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
    }

    .status-badge {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      font-size: 12px;
    }

    .skills-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 20px;
      border-bottom: 1px solid #eee;
      background: #f9f9f9;
    }

    .skill-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      font-size: 14px;
    }

    .skill-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .skill-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user .message-content {
      background: #667eea;
      color: white;
      border-radius: 12px 2px 12px 12px;
    }

    .assistant .message-content {
      background: #f0f0f0;
      color: #333;
      border-radius: 2px 12px 12px 12px;
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #eee;
      background: #f9f9f9;
      display: flex;
      gap: 10px;
    }

    .input-group {
      flex: 1;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .loading {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .loading span {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .timestamp {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Jarvis</h1>
      <div class="status-badge" id="status">Connecting...</div>
    </div>

    <div class="skills-bar" id="skillsBar">
      <!-- Skills loaded dynamically -->
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
      <div class="input-group">
        <input
          type="text"
          id="messageInput"
          placeholder="Ask Jarvis anything..."
          autocomplete="off"
        />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    let activeSkill = null;
    let isLoading = false;
    let ws = null;

    async function loadSkills() {
      try {
        const res = await fetch(`${API_URL}/skills`);
        const data = await res.json();
        const skillsBar = document.getElementById('skillsBar');
        
        data.skills.forEach(skill => {
          const btn = document.createElement('button');
          btn.className = 'skill-btn';
          btn.textContent = `/${skill.name}`;
          btn.title = skill.description;
          btn.onclick = () => selectSkill(skill.name);
          skillsBar.appendChild(btn);
        });
      } catch (error) {
        console.error('Failed to load skills:', error);
      }
    }

    function selectSkill(skillName) {
      activeSkill = activeSkill === skillName ? null : skillName;
      document.querySelectorAll('.skill-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === `/${skillName}`);
      });
      
      const status = activeSkill ? `Using /${activeSkill}` : 'Ready';
      document.getElementById('status').textContent = status;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || isLoading) return;
      
      isLoading = true;
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;

      addMessage('user', message);
      addLoading();
      input.value = '';

      try {
        let response;
        if (activeSkill) {
          response = await fetch(`${API_URL}/skill/${activeSkill}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input: message })
          });
        } else {
          response = await fetch(`${API_URL}/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, user_id: 'web-user' })
          });
        }

        const data = await response.json();
        removeLoading();
        addMessage('assistant', data.content);
      } catch (error) {
        removeLoading();
        addMessage('assistant', `Error: ${error.message}`);
      } finally {
        isLoading = false;
        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function addMessage(role, content) {
      const chatContainer = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'timestamp';
      timeDiv.textContent = new Date().toLocaleTimeString();
      
      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addLoading() {
      const chatContainer = document.getElementById('chatContainer');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message assistant';
      loadingDiv.id = 'loading';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
      
      loadingDiv.appendChild(contentDiv);
      chatContainer.appendChild(loadingDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeLoading() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    }

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initialize
    loadSkills();
    document.getElementById('status').textContent = 'Ready';
  </script>
</body>
</html>
